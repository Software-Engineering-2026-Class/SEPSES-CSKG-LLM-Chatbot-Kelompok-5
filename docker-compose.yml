version: '3.9'

# ============================================================
# SEPSES CSKG LLM Chatbot - Docker Compose
# ============================================================
# Services:
#   fuseki  : Apache Jena Fuseki (SPARQL triplestore lokal)
#   chatbot : Streamlit application
#
# Note: LLM inference now uses OpenRouter API (cloud-based)
#       No local LLM server needed.
#
# Penggunaan:
#   docker compose up fuseki   # Hanya SPARQL endpoint
#   docker compose up          # Semua services
# ============================================================

services:

  # ---- Apache Jena Fuseki (SPARQL Triplestore) ----
  fuseki:
    image: stain/jena-fuseki:4.9.0
    container_name: sepses_fuseki
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:-admin123}
      - JVM_ARGS=-Xmx2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Streamlit Chatbot Application ----
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sepses_chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - SPARQL_ENDPOINT=http://fuseki:3030/sepses/sparql
      - FUSEKI_ENDPOINT=http://fuseki:3030/sepses/sparql
      - CHROMA_DB_PATH=/app/data/chroma_db
    volumes:
      - ./data:/app/data
    depends_on:
      fuseki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fuseki_data:
    driver: local
